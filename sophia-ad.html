<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOPHIA Ad — Export HD Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Space Grotesk', sans-serif; color: #fff; }
  canvas { border: 1px solid rgba(255,255,255,0.05); }
  .controls { margin: 24px 0; display: flex; gap: 16px; }
  .controls button {
    padding: 14px 36px; border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600;
    background: #00e89d; color: #000; transition: 0.2s;
  }
  .controls button:hover { background: #00ffad; transform: translateY(-1px); }
  .info { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 14px; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="info">1080 x 1350 Portrait (2x render)</div>
<canvas id="c" width="2160" height="2700" style="width:540px;height:675px;"></canvas>
<div class="controls">
  <button onclick="downloadPNG()">Download PNG</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 2160, H = 2700;

const assets = {};
let loaded = 0;
const toLoad = ['sophia', 'zyprus', 'qualia'];
const srcs = {
  sophia: 'logos/sophia.png',
  zyprus: 'logos/zyprus.png',
  qualia: 'logos/qualia.webp',
};

toLoad.forEach(key => {
  const img = new Image();
  img.onload = () => { assets[key] = img; loaded++; if (loaded === toLoad.length) render(); };
  img.onerror = () => { console.warn('Failed:', key); loaded++; if (loaded === toLoad.length) render(); };
  img.src = srcs[key];
});

function render() {
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // ── Background ──
  const bg = ctx.createRadialGradient(W/2, H*0.40, 0, W/2, H/2, H*0.85);
  bg.addColorStop(0, '#0e0e1e');
  bg.addColorStop(0.5, '#080812');
  bg.addColorStop(1, '#030306');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ambient washes
  ctx.globalAlpha = 0.035;
  let g1 = ctx.createRadialGradient(W*0.3, H*0.25, 0, W*0.3, H*0.25, W*0.4);
  g1.addColorStop(0, '#00e89d'); g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);
  let g2 = ctx.createRadialGradient(W*0.7, H*0.75, 0, W*0.7, H*0.75, W*0.35);
  g2.addColorStop(0, '#3b82f6'); g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = 1;

  // Stars
  for (let i = 0; i < 200; i++) {
    const x = Math.random()*W, y = Math.random()*H;
    const sz = 1 + Math.random()*2;
    ctx.fillStyle = `rgba(200,200,255,${0.03+Math.random()*0.07})`;
    ctx.fillRect(x, y, sz, sz);
  }

  // ── TITLE — "SOPHIA" ──
  const titleY = 250;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title glow
  ctx.shadowColor = 'rgba(0,232,157,0.15)';
  ctx.shadowBlur = 80;
  ctx.font = '700 340px "Space Grotesk", sans-serif';
  ctx.letterSpacing = '28px';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SOPHIA', W/2, titleY);
  ctx.shadowBlur = 0;

  // ── "Zyprus's AI Agent" ──
  const sub1Y = titleY + 240;
  ctx.font = '300 130px "Space Grotesk", sans-serif';
  ctx.letterSpacing = '8px';
  const subGrad = ctx.createLinearGradient(W/2 - 600, sub1Y, W/2 + 600, sub1Y);
  subGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
  subGrad.addColorStop(0.5, '#ffffff');
  subGrad.addColorStop(1, 'rgba(255,255,255,0.7)');
  ctx.fillStyle = subGrad;
  ctx.fillText("Zyprus\u2019s AI Agent", W/2, sub1Y);

  // ── Accent line ──
  const lineY = sub1Y + 80;
  const lineGrad = ctx.createLinearGradient(W/2 - 300, lineY, W/2 + 300, lineY);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.15, 'rgba(0,232,157,0.6)');
  lineGrad.addColorStop(0.5, '#00e89d');
  lineGrad.addColorStop(0.85, 'rgba(0,232,157,0.6)');
  lineGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(W/2 - 300, lineY, 600, 5);

  // ── Subtitle ──
  const sub2Y = lineY + 80;
  ctx.font = '500 48px "JetBrains Mono", monospace';
  ctx.letterSpacing = '5px';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('AI-DRIVEN INTELLIGENCE FOR REAL ESTATE', W/2, sub2Y);
  const sub3Y = sub2Y + 65;
  ctx.font = '400 40px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(0,232,157,0.6)';
  ctx.fillText('BY QUALIA SOLUTIONS', W/2, sub3Y);
  ctx.letterSpacing = '0px';

  // ── SOPHIA portrait ──
  if (assets.sophia) {
    const cx = W/2, cy = H/2 + 360;
    const r = 908;

    // Soft ambient glow behind portrait
    const glow = ctx.createRadialGradient(cx, cy, r*0.2, cx, cy, r*1.1);
    glow.addColorStop(0, 'rgba(0,232,157,0.04)');
    glow.addColorStop(0.5, 'rgba(0,150,255,0.02)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow; ctx.globalAlpha = 1;
    ctx.fillRect(0, 0, W, H);

    // Portrait — no clip circle, just draw the image with soft fade
    const imgS = r * 2.15;
    ctx.drawImage(assets.sophia, cx-imgS/2, cy-imgS/2, imgS, imgS);
  }

  // ── Zyprus logo — bottom left ──
  if (assets.zyprus) {
    const zH = 400;
    const zAspect = assets.zyprus.naturalWidth / assets.zyprus.naturalHeight;
    const zW = zH * zAspect;
    const pad = 70;
    ctx.drawImage(assets.zyprus, pad - 20, H - pad - zH + 30, zW, zH);
  }

  // ── Qualia logo — bottom right ──
  if (assets.qualia) {
    const qH = 320;
    const qAspect = assets.qualia.naturalWidth / assets.qualia.naturalHeight;
    const qW = qH * qAspect;
    const pad = 70;
    ctx.drawImage(assets.qualia, W - pad - qW + 8, H - pad - qH, qW, qH);
  }
}

function downloadPNG() {
  canvas.toBlob(blob => {
    if (!blob) { alert('Export failed — canvas too large for this browser'); return; }
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'sophia-zyprus-ai-agent-portrait.png';
    link.href = url;
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}
</script>
</body>
</html>
