function loadSVGIcon(svgStr) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}
function loadURLIcon(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => { console.warn('Failed to load:', url); resolve(null); };
    img.src = url;
  });
}

    Object.entries(externalLogos).map(([k, url]) => loadURLIcon(url).then(img => [k, img]))
  );
  urlResults.forEach(([k, img]) => { if (img) loadedIcons[k] = img; });
  iconsReady = true;
}

let sc = 1;
function recalcScale() { sc = Math.min(W, H) / 820; }

const _resize = resize;
resize = function() { _resize(); recalcScale(); };

nodes.forEach(n => {
  n.pulsePhase = Math.random() * Math.PI * 2;
  n.wobX = Math.random() * Math.PI * 2;
  n.wobY = Math.random() * Math.PI * 2;
  n.wobSpX = 0.06 + Math.random() * 0.04;
  n.wobSpY = 0.05 + Math.random() * 0.04;
  n.wobAmt = n.cat === 'core' ? 0 : 2 + Math.random() * 3;
});

function getPos(n) {
  const wx = n.wobAmt * Math.sin(time * n.wobSpX + n.wobX) * sc;
  const wy = n.wobAmt * Math.sin(time * n.wobSpY + n.wobY) * sc;
  return { x: n.pos[0] * W + wx, y: n.pos[1] * H + wy };
}
function getR(n) { return n.baseR * sc; }

// Particles
const particles = [];
function spawnParticle(conn) {
  if (particles.length >= 80) return;
  const from = nodes.find(n => n.id === conn[0]);
  const to = nodes.find(n => n.id === conn[1]);
  if (!from || !to) return;
  const cat = to.cat === 'core' ? from.cat : to.cat;
  particles.push({
    from: conn[0], to: conn[1], progress: 0,
    speed: 0.001 + Math.random() * 0.0025,
    color: categories[cat]?.color || '#fff',
    size: 1 + Math.random() * 1.5,
  });
}

const stars = Array.from({length:140}, () => ({
  x: Math.random(), y: Math.random(), s: Math.random() * 1.1,
  p: Math.random() * Math.PI * 2, sp: 0.1 + Math.random() * 0.6,
}));

// ─── HELPERS ───
function hexPath(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI/3*i - Math.PI/6;
    i===0 ? ctx.moveTo(x+r*Math.cos(a), y+r*Math.sin(a))
          : ctx.lineTo(x+r*Math.cos(a), y+r*Math.sin(a));
  }
  ctx.closePath();
}
function roundedRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.roundRect(x-w/2, y-h/2, w, h, r);
}

function bezCP(x1,y1,x2,y2) {
  const mx=(x1+x2)/2, my=(y1+y2)/2, dx=x2-x1, dy=y2-y1;
  const d=Math.sqrt(dx*dx+dy*dy)||1, off=d*0.08;
  return { x: mx-dy/d*off, y: my+dx/d*off };
}
function bezPt(x1,y1,cpx,cpy,x2,y2,t) {
  const u=1-t;
  return { x:u*u*x1+2*u*t*cpx+t*t*x2, y:u*u*y1+2*u*t*cpy+t*t*y2 };
}

// ─── MAIN LOOP ───
function draw() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createRadialGradient(cx, cy*0.9, 0, cx, cy, Math.max(W,H)*0.8);
  bg.addColorStop(0, '#0a0a16'); bg.addColorStop(0.5, '#050510'); bg.addColorStop(1, '#020204');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Ambient washes — left blue, right orange, center green
  ctx.globalAlpha = 0.02 + 0.005*Math.sin(time*0.2);
  let gL = ctx.createRadialGradient(W*0.14, H*0.5, 0, W*0.14, H*0.5, W*0.3);
  gL.addColorStop(0, '#3b82f6'); gL.addColorStop(1, 'transparent');
  ctx.fillStyle = gL; ctx.fillRect(0,0,W,H);
  let gR = ctx.createRadialGradient(W*0.86, H*0.5, 0, W*0.86, H*0.5, W*0.28);
  gR.addColorStop(0, '#f97316'); gR.addColorStop(1, 'transparent');
  ctx.fillStyle = gR; ctx.fillRect(0,0,W,H);
  let gC = ctx.createRadialGradient(cx, cy, 0, cx, cy, W*0.25);
  gC.addColorStop(0, '#00e89d'); gC.addColorStop(1, 'transparent');
  ctx.fillStyle = gC; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = 1;

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(180,180,240,${0.06+0.06*Math.sin(time*s.sp+s.p)})`;
    ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  });

  // ── Section labels ──
  const lblFs = Math.max(10, 11*sc);
  ctx.font = `300 ${lblFs}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // PLATFORMS label (left)
  ctx.fillStyle = '#3b82f6'; ctx.globalAlpha = 0.7;
  ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 16;
  ctx.fillText('PLATFORMS', W*0.15, H*0.105);
  ctx.shadowBlur = 0;
  // Thin line under
  ctx.beginPath(); ctx.moveTo(W*0.145-40*sc, H*0.105+10*sc);
  ctx.lineTo(W*0.145+40*sc, H*0.105+10*sc);
  ctx.strokeStyle = '#3b82f6'; ctx.globalAlpha = 0.08; ctx.lineWidth = 1; ctx.stroke();

  // CAPABILITIES label (right)
  ctx.fillStyle = '#f97316'; ctx.globalAlpha = 0.7;
  ctx.shadowColor = '#f97316'; ctx.shadowBlur = 16;
  ctx.fillText('CAPABILITIES', W*0.86, H*0.105);
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.moveTo(W*0.86-48*sc, H*0.105+10*sc);
  ctx.lineTo(W*0.86+48*sc, H*0.105+10*sc);
  ctx.strokeStyle = '#f97316'; ctx.globalAlpha = 0.08; ctx.lineWidth = 1; ctx.stroke();
  ctx.globalAlpha = 1;

  // ── Vertical divider lines (very subtle) ──
  // Left zone boundary
  ctx.beginPath();
  ctx.moveTo(W*0.33, H*0.12); ctx.lineTo(W*0.33, H*0.92);
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1; ctx.stroke();
  // Right zone boundary
  ctx.beginPath();
  ctx.moveTo(W*0.67, H*0.12); ctx.lineTo(W*0.67, H*0.92);
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1; ctx.stroke();

  // ── CONNECTIONS ──
  connections.forEach(([fId, tId, type]) => {
    const f = nodes.find(n => n.id === fId), t = nodes.find(n => n.id === tId);
    if (!f || !t) return;
    const fp = getPos(f), tp = getPos(t);
    let alpha = type==='strong' ? 0.35 : type==='data' ? 0.22 : 0.22;
    let w = type==='strong' ? 2 : 1.3;
    const cp = bezCP(fp.x,fp.y,tp.x,tp.y);
    const grad = ctx.createLinearGradient(fp.x,fp.y,tp.x,tp.y);
    grad.addColorStop(0, categories[f.cat]?.color||'#fff');
    grad.addColorStop(1, categories[t.cat]?.color||'#fff');
    ctx.beginPath(); ctx.moveTo(fp.x,fp.y);
    ctx.quadraticCurveTo(cp.x,cp.y,tp.x,tp.y);
    ctx.strokeStyle = grad; ctx.globalAlpha = alpha; ctx.lineWidth = w;
    ctx.stroke(); ctx.globalAlpha = 1;
  });

  // Particles
  if (Math.random() < 0.08) spawnParticle(connections[Math.floor(Math.random()*connections.length)]);
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i]; p.progress += p.speed;
    if (p.progress >= 1) { particles.splice(i,1); continue; }
    const f = nodes.find(n => n.id === p.from), t = nodes.find(n => n.id === p.to);
    if (!f||!t) { particles.splice(i,1); continue; }
    const fp = getPos(f), tp = getPos(t), cp = bezCP(fp.x,fp.y,tp.x,tp.y);
    const pt = bezPt(fp.x,fp.y,cp.x,cp.y,tp.x,tp.y,p.progress);
    const a = Math.sin(p.progress*Math.PI);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,p.size*4,0,Math.PI*2);
    ctx.fillStyle = p.color; ctx.globalAlpha = a*0.05; ctx.fill();
    ctx.beginPath(); ctx.arc(pt.x,pt.y,p.size,0,Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.globalAlpha = a*0.75; ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ─── NODES ───
  let newHovered = null;
  nodes.forEach(n => {
    const pos = getPos(n);
    const r = getR(n);
    const dist = Math.hypot(mouse.x-pos.x, mouse.y-pos.y);
    const isHov = dist < r + 16;
    if (isHov) newHovered = n;
    const color = categories[n.cat]?.color || '#fff';
    const s = r * (isHov ? 1.06 : 1);

    // Glow
    const glowR = s * (n.cat==='core' ? 2.5 : (isHov ? 2.5 : 1.4));
    const glow = ctx.createRadialGradient(pos.x,pos.y,s*0.2,pos.x,pos.y,glowR);
    glow.addColorStop(0, color); glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.globalAlpha = n.cat==='core' ? 0.12 : (isHov ? 0.12 : 0.025+0.012*Math.sin(time*1+n.pulsePhase));
    ctx.beginPath(); ctx.arc(pos.x,pos.y,glowR,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    ctx.save();

    if (n.cat === 'core') {
      // ── SOPHIA ──
      if (iconsReady && loadedIcons[n.icon]) {
        // Rotating ring 1
        ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(time*0.05);
        ctx.setLineDash([12*sc, 24*sc]);
        ctx.beginPath(); ctx.arc(0,0,s+10*sc,0,Math.PI*2);
        ctx.strokeStyle = 'rgba(0,232,157,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
        // Rotating ring 2
        ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(-time*0.025);
        ctx.setLineDash([5*sc, 35*sc]);
        ctx.beginPath(); ctx.arc(0,0,s+20*sc,0,Math.PI*2);
        ctx.strokeStyle = 'rgba(0,196,255,0.05)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.setLineDash([]); ctx.restore();

        // Portrait
        ctx.save();
        ctx.beginPath(); ctx.arc(pos.x,pos.y,s,0,Math.PI*2); ctx.clip();
        const imgS = s*2.15;
        ctx.drawImage(loadedIcons[n.icon], pos.x-imgS/2, pos.y-imgS/2, imgS, imgS);
        ctx.restore();

        // Border gradient
        ctx.beginPath(); ctx.arc(pos.x,pos.y,s+2,0,Math.PI*2);
        const bG = ctx.createLinearGradient(pos.x-s,pos.y-s,pos.x+s,pos.y+s);
        bG.addColorStop(0,'rgba(0,232,157,0.28)');
        bG.addColorStop(0.5,'rgba(0,196,255,0.12)');
        bG.addColorStop(1,'rgba(0,232,157,0.28)');
        ctx.strokeStyle = bG; ctx.lineWidth = 2.5; ctx.stroke();
      } else {
        // Fallback text
        ctx.beginPath(); ctx.arc(pos.x,pos.y,s,0,Math.PI*2);
        ctx.fillStyle = 'rgba(0,232,157,0.1)'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,232,157,0.3)'; ctx.lineWidth = 2; ctx.stroke();
        const cFs = Math.max(20, 32*sc);
        ctx.font = `700 ${cFs}px 'Space Grotesk', sans-serif`;
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('SOPHIA', pos.x, pos.y);
      }

    } else if (n.cat === 'channel') {
      // ── PLATFORMS — hexagons ──
      // Shadow
      hexPath(pos.x+1, pos.y+2, s);
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
      // Fill
      hexPath(pos.x, pos.y, s);
      const hg = ctx.createLinearGradient(pos.x,pos.y-s,pos.x,pos.y+s);
      hg.addColorStop(0, 'rgba(59,130,246,0.2)');
      hg.addColorStop(1, 'rgba(59,130,246,0.06)');
      ctx.fillStyle = hg; ctx.globalAlpha = isHov ? 1 : 0.85; ctx.fill();
      // Glass
      hexPath(pos.x, pos.y-s*0.06, s*0.8);
      ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
      // Border
      hexPath(pos.x, pos.y, s);
      ctx.strokeStyle = color; ctx.globalAlpha = isHov ? 0.5 : 0.15;
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.globalAlpha = 1;

      // Icon — clip inside hexagon for external logos
      if (iconsReady && loadedIcons[n.icon]) {
        const isExternal = !!externalLogos[n.icon];
        if (isExternal) {
          // Clip to circle inside hexagon, draw logo filling it
          ctx.save();
          ctx.beginPath(); ctx.arc(pos.x, pos.y, s*0.72, 0, Math.PI*2); ctx.clip();
          const img = loadedIcons[n.icon];
          const aspect = img.naturalWidth / img.naturalHeight;
          let iW, iH;
          if (aspect > 1.3) { iW = s*1.5; iH = iW/aspect; }
          else { iH = s*1.44; iW = iH*aspect; }
          ctx.drawImage(img, pos.x-iW/2, pos.y-iH/2, iW, iH);
          ctx.restore();
        } else {
          const iSz = s * 1.05;
          ctx.drawImage(loadedIcons[n.icon], pos.x-iSz/2, pos.y-iSz/2, iSz, iSz);
        }
      }
      // Label
      const fs = Math.max(11, 14*sc);
      ctx.font = `500 ${fs}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle = '#fff'; ctx.globalAlpha = isHov ? 0.95 : 0.5;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(n.name, pos.x, pos.y + s + 9*sc);

    } else {
      // ── CAPABILITIES — rounded squares ──
      const boxS = s * 1.8;
      const rad = 10 * sc;
      // Shadow
      roundedRect(pos.x+1, pos.y+2, boxS, boxS, rad);
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
      // Fill
      roundedRect(pos.x, pos.y, boxS, boxS, rad);
      const tg = ctx.createLinearGradient(pos.x,pos.y-boxS/2,pos.x,pos.y+boxS/2);
      tg.addColorStop(0, 'rgba(249,115,22,0.12)');
      tg.addColorStop(1, 'rgba(249,115,22,0.04)');
      ctx.fillStyle = tg; ctx.globalAlpha = isHov ? 1 : 0.85; ctx.fill();
      // Glass
      roundedRect(pos.x, pos.y-boxS*0.06, boxS*0.85, boxS*0.45, rad*0.8);
      ctx.fillStyle = 'rgba(255,255,255,0.025)'; ctx.fill();
      // Border
      roundedRect(pos.x, pos.y, boxS, boxS, rad);
      ctx.strokeStyle = color; ctx.globalAlpha = isHov ? 0.5 : 0.15;
      ctx.lineWidth = 1.3; ctx.stroke();
      ctx.globalAlpha = 1;

      // Icon
      if (iconsReady && loadedIcons[n.icon]) {
        const iSz = s * 1.1;
        ctx.drawImage(loadedIcons[n.icon], pos.x-iSz/2, pos.y-iSz/2, iSz, iSz);
      }
      // Label
      const fs = Math.max(10, 13*sc);
      ctx.font = `500 ${fs}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle = '#fff'; ctx.globalAlpha = isHov ? 0.95 : 0.45;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(n.name, pos.x, pos.y + boxS/2 + 8*sc);
    }

    ctx.restore();
    ctx.globalAlpha = 1;
  });

  hoveredNode = newHovered;

  // Tooltip
  const tt = document.getElementById('tooltip');
  if (hoveredNode && hoveredNode.cat !== 'core') {
    const pos = getPos(hoveredNode);
    const color = categories[hoveredNode.cat]?.color || '#fff';
    const badge = tt.querySelector('.tt-badge');
    badge.textContent = hoveredNode.badge;
    badge.style.background = color+'12';
    badge.style.color = color;
    badge.style.border = `1px solid ${color}25`;
    tt.querySelector('.tt-name').textContent = hoveredNode.name;
    tt.querySelector('.tt-desc').textContent = hoveredNode.desc;
    tt.querySelector('.tt-tech').textContent = hoveredNode.tech;
    tt.style.borderColor = color+'15';
    let tx = pos.x+28, ty = pos.y-44;
    if (tx+310>W) tx = pos.x-320;
    if (ty<10) ty = 10;
    if (ty+160>H) ty = H-170;
    tt.style.left = tx+'px'; tt.style.top = ty+'px';
    tt.classList.add('show');
    document.body.style.cursor = 'pointer';
  } else {
    tt.classList.remove('show');
    document.body.style.cursor = 'default';
  }

  requestAnimationFrame(draw);
}

window.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x=-1000; mouse.y=-1000; });


draw();
</script>
</body>
</html>
